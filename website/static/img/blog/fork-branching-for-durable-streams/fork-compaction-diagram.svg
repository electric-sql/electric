<svg width="100%" viewBox="0 0 680 280" xmlns="http://www.w3.org/2000/svg">
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<!-- Main stream: messages 1-5 -->
<rect x="40" y="48" width="56" height="36" rx="4" fill="#9FE1CB" stroke="#0F6E56" stroke-width="0.5"/>
<text font-family="sans-serif" font-size="12" fill="#085041" x="68" y="70" text-anchor="middle">msg 1</text>

<line x1="96" y1="66" x2="108" y2="66" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>

<rect x="114" y="48" width="56" height="36" rx="4" fill="#9FE1CB" stroke="#0F6E56" stroke-width="0.5"/>
<text font-family="sans-serif" font-size="12" fill="#085041" x="142" y="70" text-anchor="middle">msg 2</text>

<line x1="170" y1="66" x2="182" y2="66" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>

<rect x="188" y="48" width="56" height="36" rx="4" fill="#9FE1CB" stroke="#0F6E56" stroke-width="0.5"/>
<text font-family="sans-serif" font-size="12" fill="#085041" x="216" y="70" text-anchor="middle">msg 3</text>

<line x1="244" y1="66" x2="256" y2="66" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>

<rect x="262" y="48" width="56" height="36" rx="4" fill="#9FE1CB" stroke="#0F6E56" stroke-width="0.5"/>
<text font-family="sans-serif" font-size="12" fill="#085041" x="290" y="70" text-anchor="middle">msg 4</text>

<line x1="318" y1="66" x2="330" y2="66" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>

<rect x="336" y="48" width="56" height="36" rx="4" fill="#9FE1CB" stroke="#0F6E56" stroke-width="0.5"/>
<text font-family="sans-serif" font-size="12" fill="#085041" x="364" y="70" text-anchor="middle">msg 5</text>

<!-- Fork point marker -->
<circle cx="404" cy="66" r="5" fill="#EF9F27" stroke="none"/>
<text font-family="sans-serif" font-size="12" fill="#854F0B" x="404" y="108" text-anchor="middle">fork</text>

<!-- Branch right: compacted -->
<line x1="409" y1="66" x2="420" y2="66" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>

<rect x="426" y="48" width="96" height="36" rx="4" fill="#CECBF6" stroke="#534AB7" stroke-width="0.5"/>
<text font-family="sans-serif" font-size="12" fill="#3C3489" x="474" y="70" text-anchor="middle">compacted</text>

<line x1="522" y1="66" x2="534" y2="66" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>

<rect x="540" y="48" width="56" height="36" rx="4" fill="#9FE1CB" stroke="#0F6E56" stroke-width="0.5"/>
<text font-family="sans-serif" font-size="12" fill="#085041" x="568" y="70" text-anchor="middle">msg 6</text>

<line x1="596" y1="66" x2="608" y2="66" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>

<rect x="614" y="48" width="30" height="36" rx="4" fill="#9FE1CB" stroke="#0F6E56" stroke-width="0.5"/>
<text font-family="sans-serif" font-size="12" fill="#085041" x="629" y="70" text-anchor="middle">...</text>

<!-- Branch down: full history preserved -->
<path d="M404 71 L404 200 L420 200" fill="none" stroke="#888780" stroke-width="0.5" marker-end="url(#arrow)"/>

<rect x="426" y="182" width="210" height="36" rx="4" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
<text font-family="sans-serif" font-size="12" fill="#444441" x="531" y="204" text-anchor="middle">full history preserved</text>

<!-- Recover arrow -->
<path d="M531 182 L568 182 L568 90" fill="none" stroke="#EF9F27" stroke-width="0.5" stroke-dasharray="4 3" marker-end="url(#arrow)"/>
<text font-family="sans-serif" font-size="12" fill="#854F0B" x="592" y="148">recover lost</text>
<text font-family="sans-serif" font-size="12" fill="#854F0B" x="592" y="164">context</text>

</svg>
