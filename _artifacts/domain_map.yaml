skills:
  - name: 'Shape Streaming'
    slug: 'shape-streaming'
    domain: 'syncing-data'
    description: 'Configure ShapeStream and Shape to sync a Postgres table to the client — table, where, columns, parsers, column mappers, replica mode, error handling'
    type: 'core'
    covers:
      - 'ShapeStream'
      - 'Shape'
      - 'ShapeStreamOptions'
      - 'where clauses and positional params'
      - 'columns filtering'
      - 'replica mode (default vs full)'
      - 'custom type parsers (timestamptz, jsonb, etc.)'
      - 'column mapper (snake_case ↔ camelCase)'
      - 'transformer functions'
      - 'offset and handle for resumption'
      - 'subscribe/unsubscribe pattern'
      - 'onError handler semantics'
      - 'backoff options'
      - 'log mode (full vs changes_only)'
      - 'requestSnapshot and fetchSnapshot'
    tasks:
      - 'Set up a shape to sync a Postgres table'
      - 'Filter synced rows with a WHERE clause'
      - 'Select specific columns to sync'
      - 'Parse custom Postgres types (timestamps, JSON, etc.)'
      - 'Map column names between snake_case and camelCase'
      - 'Resume syncing from a stored offset'
      - 'Handle sync errors and implement retry logic'
      - 'Fetch on-demand subsets/snapshots of shape data'
    reference_candidates:
      - topic: 'WHERE clause supported types and functions'
        reason: '>15 supported types and function restrictions (no non-deterministic functions, enum casting rules)'
      - topic: 'Default type parsers'
        reason: '8+ built-in parsers with specific behaviors (int8 returns BigInt, etc.)'
    failure_modes:
      - mistake: 'Returning void from onError stops sync permanently'
        mechanism: 'onError returning undefined/void signals the stream to stop. Return {} to retry.'
        wrong_pattern: |
          onError: (error) => {
            console.error('sync error', error)
            // returning nothing = stream stops!
          }
        correct_pattern: |
          onError: (error) => {
            console.error('sync error', error)
            return {} // stream retries
          }
        source: 'packages/typescript-client/src/client.ts:409-418'
        priority: 'CRITICAL'
        status: 'active'

      - mistake: 'Using columns without including primary key'
        mechanism: 'Server returns 400 error. The columns list must always include the primary key column(s).'
        wrong_pattern: |
          params: {
            table: 'todos',
            columns: ['title', 'status']
          }
        correct_pattern: |
          params: {
            table: 'todos',
            columns: ['id', 'title', 'status']
          }
        source: 'website/docs/guides/shapes.md:181'
        priority: 'HIGH'
        status: 'active'

      - mistake: 'Setting offset without handle for resumption'
        mechanism: 'Throws MissingShapeHandleError. Both offset AND handle are required to resume a stream.'
        wrong_pattern: |
          new ShapeStream({
            url: '/api/items',
            offset: storedOffset,
            // missing handle!
          })
        correct_pattern: |
          new ShapeStream({
            url: '/api/items',
            offset: storedOffset,
            handle: storedHandle,
          })
        source: 'packages/typescript-client/src/client.ts:1997-2003'
        priority: 'HIGH'
        status: 'active'

      - mistake: 'Using non-deterministic functions in WHERE clause'
        mechanism: 'Server rejects WHERE clauses with functions like now(), count(), random(). Use static values or positional params.'
        wrong_pattern: |
          params: {
            table: 'events',
            where: "start_time > now()"
          }
        correct_pattern: |
          params: {
            table: 'events',
            where: "start_time > $1",
            params: { '1': new Date().toISOString() }
          }
        source: 'packages/sync-service/lib/electric/replication/eval/env/known_functions.ex'
        priority: 'HIGH'
        status: 'active'

      - mistake: 'Not parsing custom Postgres types'
        mechanism: 'All values arrive as strings. Without a parser, timestamptz is a string, not a Date object.'
        wrong_pattern: |
          new ShapeStream({
            url: '/api/items',
            params: { table: 'events' }
            // no parser — createdAt will be string
          })
        correct_pattern: |
          new ShapeStream({
            url: '/api/items',
            params: { table: 'events' },
            parser: {
              timestamptz: (date) => new Date(date)
            }
          })
        source: 'AGENTS.md:300-308'
        priority: 'HIGH'
        status: 'active'

      - mistake: 'Using reserved parameter names in params'
        mechanism: 'Throws ReservedParamError. Names like cursor, handle, live, offset, cache-buster, and subset__* are reserved.'
        wrong_pattern: |
          params: {
            table: 'todos',
            offset: '0',    // reserved!
            cursor: 'abc',  // reserved!
          }
        correct_pattern: |
          params: {
            table: 'todos',
            page_offset: '0',
            page_cursor: 'abc',
          }
        source: 'packages/typescript-client/src/client.ts:1984-1985'
        priority: 'MEDIUM'
        status: 'active'

      - mistake: 'Mutating shape options on a running stream'
        mechanism: 'Shapes are immutable per subscription. Changing params on a running stream has no effect.'
        wrong_pattern: |
          const stream = new ShapeStream({ url, params: { table: 'todos', where: "status = 'active'" } })
          // later...
          stream.options.params.where = "status = 'done'" // no effect!
        correct_pattern: |
          // Create a new stream with different params
          const newStream = new ShapeStream({ url, params: { table: 'todos', where: "status = 'done'" } })
        source: 'AGENTS.md:106'
        priority: 'MEDIUM'
        status: 'active'

  - name: 'Proxy and Auth'
    slug: 'proxy-and-auth'
    domain: 'securing-access'
    description: 'Set up a server-side proxy to forward Electric requests, inject auth, and prevent direct client access to Electric'
    type: 'core'
    covers:
      - 'ELECTRIC_PROTOCOL_QUERY_PARAMS'
      - 'Server-side shape definition (table, where, params)'
      - 'Auth token forwarding'
      - 'Tenant isolation via WHERE params'
      - 'CORS header configuration'
      - 'Content-encoding/content-length header cleanup'
      - 'onError for 401 token refresh'
      - 'Subset security (AND semantics)'
    tasks:
      - 'Create a proxy route that forwards Electric params'
      - 'Add authentication to shape requests'
      - 'Implement tenant isolation with WHERE clause params'
      - 'Refresh auth tokens on 401 errors'
      - 'Configure CORS headers for Electric responses'
    failure_modes:
      - mistake: 'Forwarding all client params to Electric (security hole)'
        mechanism: 'Client can control table/where/columns, accessing any Postgres table. Only forward ELECTRIC_PROTOCOL_QUERY_PARAMS.'
        wrong_pattern: |
          url.searchParams.forEach((value, key) => {
            originUrl.searchParams.set(key, value) // client controls table!
          })
        correct_pattern: |
          import { ELECTRIC_PROTOCOL_QUERY_PARAMS } from '@electric-sql/client'
          url.searchParams.forEach((value, key) => {
            if (ELECTRIC_PROTOCOL_QUERY_PARAMS.includes(key)) {
              originUrl.searchParams.set(key, value)
            }
          })
          originUrl.searchParams.set('table', 'todos') // server decides
        source: 'examples/proxy-auth/app/shape-proxy/route.ts'
        priority: 'CRITICAL'
        status: 'active'

      - mistake: 'Not deleting content-encoding and content-length headers'
        mechanism: 'fetch() decompresses the body but keeps the headers, causing browser decoding failures.'
        wrong_pattern: |
          return new Response(response.body, {
            status: response.status,
            headers: response.headers, // broken encoding headers!
          })
        correct_pattern: |
          const headers = new Headers(response.headers)
          headers.delete('content-encoding')
          headers.delete('content-length')
          return new Response(response.body, { status: response.status, headers })
        source: 'examples/proxy-auth/app/shape-proxy/route.ts:49-56'
        priority: 'CRITICAL'
        status: 'active'

      - mistake: 'Exposing ELECTRIC_SECRET or SOURCE_SECRET to browser'
        mechanism: 'Bundlers like Vite expose VITE_* env vars to client code. Secret must only be injected server-side in the proxy.'
        wrong_pattern: |
          // In client code
          const url = `/v1/shape?table=todos&secret=${import.meta.env.VITE_ELECTRIC_SOURCE_SECRET}`
        correct_pattern: |
          // In server proxy only
          originUrl.searchParams.set('secret', process.env.ELECTRIC_SOURCE_SECRET)
        source: 'AGENTS.md:17-20'
        priority: 'CRITICAL'
        status: 'active'

      - mistake: 'Not exposing Electric response headers via CORS'
        mechanism: 'Client throws MissingHeadersError. CORS must expose electric-offset, electric-handle, electric-schema, electric-cursor.'
        wrong_pattern: |
          // No CORS configuration — browser strips custom headers
        correct_pattern: |
          headers.set('Access-Control-Expose-Headers',
            'electric-offset, electric-handle, electric-schema, electric-cursor')
        source: 'packages/typescript-client/src/error.ts:109-118'
        priority: 'HIGH'
        status: 'active'

      - mistake: 'SQL injection in WHERE clause via string interpolation'
        mechanism: 'User input interpolated into WHERE clause enables SQL injection. Use positional params ($1, $2).'
        wrong_pattern: |
          originUrl.searchParams.set('where', `org_id = '${user.orgId}'`)
        correct_pattern: |
          originUrl.searchParams.set('where', 'org_id = $1')
          originUrl.searchParams.set('params[1]', user.orgId)
        source: 'website/docs/guides/auth.md'
        priority: 'CRITICAL'
        status: 'active'

      - mistake: 'Calling Electric directly from production client'
        mechanism: 'Electric HTTP API is public by default with no auth. Must proxy through server.'
        wrong_pattern: |
          new ShapeStream({
            url: 'https://my-electric.example.com/v1/shape',
            params: { table: 'todos' }
          })
        correct_pattern: |
          new ShapeStream({
            url: '/api/todos', // proxy route on your server
          })
        source: 'AGENTS.md:19-20'
        priority: 'CRITICAL'
        status: 'active'

  - name: 'Postgres Security'
    slug: 'postgres-security'
    domain: 'securing-access'
    description: 'Configure Postgres roles, replication permissions, and publication management for Electric'
    type: 'core'
    covers:
      - 'REPLICATION role'
      - 'SELECT grants'
      - 'CREATE on database'
      - 'Table ownership and REPLICA IDENTITY FULL'
      - 'Publication management (auto vs manual)'
      - 'ELECTRIC_MANUAL_TABLE_PUBLISHING mode'
    tasks:
      - 'Create a Postgres user with correct permissions for Electric'
      - 'Set up replica identity on tables'
      - 'Configure manual publication management'
      - 'Debug permission errors during shape creation'
    failure_modes:
      - mistake: 'Missing REPLICA IDENTITY FULL on tables'
        mechanism: 'Electric requires REPLICA IDENTITY FULL. Without it, updates and deletes may not stream correctly.'
        wrong_pattern: |
          CREATE TABLE todos (id uuid PRIMARY KEY, text text);
          -- Missing: ALTER TABLE todos REPLICA IDENTITY FULL;
        correct_pattern: |
          CREATE TABLE todos (id uuid PRIMARY KEY, text text);
          ALTER TABLE todos REPLICA IDENTITY FULL;
        source: 'website/docs/guides/troubleshooting.md:373'
        priority: 'HIGH'
        status: 'active'

      - mistake: 'Electric user without REPLICATION role'
        mechanism: 'Electric needs logical replication. User must have REPLICATION role.'
        wrong_pattern: |
          CREATE USER electric_user WITH PASSWORD 'secret';
          -- Missing REPLICATION role
        correct_pattern: |
          CREATE USER electric_user WITH PASSWORD 'secret' REPLICATION;
          GRANT SELECT ON ALL TABLES IN SCHEMA public TO electric_user;
        source: 'website/docs/guides/postgres-permissions.md'
        priority: 'HIGH'
        status: 'active'

      - mistake: 'Using connection pooler for DATABASE_URL'
        mechanism: 'Connection poolers (except pgBouncer 1.23+) do not support logical replication. Electric must connect directly to Postgres.'
        wrong_pattern: |
          DATABASE_URL=postgres://user:pass@pooler.example.com:6432/mydb
        correct_pattern: |
          DATABASE_URL=postgres://user:pass@db.example.com:5432/mydb
          ELECTRIC_POOLED_DATABASE_URL=postgres://user:pass@pooler.example.com:6432/mydb
        source: 'website/docs/guides/deployment.md:91'
        priority: 'CRITICAL'
        status: 'active'

  - name: 'Schema and Shapes'
    slug: 'schema-and-shapes'
    domain: 'building-features'
    description: 'Design Postgres schema and shape definitions together when building a new feature'
    type: 'core'
    covers:
      - 'Table design for shape-friendly access patterns'
      - 'Single-table shape constraint'
      - 'WHERE clause design for tenant isolation'
      - 'Column selection for bandwidth optimization'
      - 'Replica mode choice (default vs full for old_value)'
    tasks:
      - 'Design a table schema that works well with Electric shapes'
      - 'Define shapes for a multi-tenant application'
      - 'Choose between full and default replica modes'
      - 'Optimize shape bandwidth with column selection'
    failure_modes:
      - mistake: 'Designing shapes that span multiple tables'
        mechanism: 'Shapes are single-table only. Cross-table queries require multiple shapes and client-side joins.'
        wrong_pattern: |
          params: {
            table: 'todos JOIN users ON todos.user_id = users.id'
          }
        correct_pattern: |
          // Two separate shapes, joined client-side
          const todoStream = new ShapeStream({ url: '/api/todos' })
          const userStream = new ShapeStream({ url: '/api/users' })
        source: 'AGENTS.md:104-105'
        priority: 'HIGH'
        status: 'active'

      - mistake: 'Using enum columns without casting to text in WHERE'
        mechanism: 'Enum types in WHERE clauses require explicit cast to text.'
        wrong_pattern: |
          params: {
            table: 'todos',
            where: "status IN ('active', 'done')"
          }
        correct_pattern: |
          params: {
            table: 'todos',
            where: "status::text IN ('active', 'done')"
          }
        source: 'packages/sync-service/lib/electric/replication/eval/env/known_functions.ex'
        priority: 'MEDIUM'
        status: 'active'

      - mistake: 'Not setting up txid handshake for optimistic writes'
        mechanism: 'Without txid, UI flickers when optimistic state is dropped before the synced version arrives. Backend must return pg_current_xact_id()::xid::text and client must awaitTxId before dropping optimistic state.'
        wrong_pattern: |
          // Backend: just INSERT, return id
          app.post('/api/todos', async (req, res) => {
            const result = await db.query('INSERT INTO todos ...')
            res.json({ id: result.rows[0].id })
          })
        correct_pattern: |
          // Backend: INSERT and return txid
          app.post('/api/todos', async (req, res) => {
            const result = await db.query(`
              INSERT INTO todos ... ;
              SELECT pg_current_xact_id()::xid::text as txid
            `)
            res.json({ id: result.rows[0].id, txid: parseInt(result.rows[1].rows[0].txid) })
          })
        source: 'AGENTS.md:116-119'
        priority: 'HIGH'
        status: 'active'

  - name: 'Debugging Sync'
    slug: 'debugging-sync'
    domain: 'running-in-production'
    description: 'Troubleshoot sync issues — stale data, missing updates, connection problems, error handling'
    type: 'lifecycle'
    covers:
      - 'Fast-loop detection and CDN misconfiguration'
      - 'Stale cache detection'
      - 'MissingHeadersError diagnosis'
      - '409 shape expired handling'
      - 'WAL growth and replication slot issues'
      - 'HTTP/1.1 connection limit in local dev'
      - 'SSE proxy buffering issues'
    tasks:
      - 'Debug why shapes are not receiving updates'
      - 'Fix proxy/CDN misconfiguration causing fast loops'
      - 'Diagnose MissingHeadersError from CORS issues'
      - 'Handle HTTP/1.1 connection limit in local development'
      - 'Monitor and manage WAL growth from replication slots'
    failure_modes:
      - mistake: 'Proxy or CDN not including query params in cache key'
        mechanism: 'Fast-loop detection fires after 5 requests in 500ms at same offset. Usually means cache is ignoring handle/offset params.'
        source: 'packages/typescript-client/src/client.ts:929-1002'
        priority: 'HIGH'
        status: 'active'

      - mistake: 'SSE responses buffered by proxy'
        mechanism: 'Nginx/Caddy buffer SSE responses by default, causing long delays. Must disable buffering for Electric endpoints.'
        wrong_pattern: |
          # nginx default — buffers responses
          location /v1/shape {
            proxy_pass http://electric:3000;
          }
        correct_pattern: |
          location /v1/shape {
            proxy_pass http://electric:3000;
            proxy_buffering off;
          }
        source: 'website/docs/guides/troubleshooting.md:69-109'
        priority: 'HIGH'
        status: 'active'

      - mistake: 'Running 6+ shapes in local dev without HTTP/2'
        mechanism: 'Browser HTTP/1.1 limits to 6 TCP connections per origin. Shapes queue behind each other. Use Caddy as HTTP/2 proxy.'
        wrong_pattern: |
          # Running Electric directly on localhost:3000
          # With 7+ shapes, requests queue
        correct_pattern: |
          # Run Caddy as HTTP/2 proxy on host (not in Docker)
          caddy run --config - --adapter caddyfile <<EOF
          localhost:3001 {
            reverse_proxy localhost:3000
          }
          EOF
        source: 'website/docs/guides/troubleshooting.md:28-53'
        priority: 'MEDIUM'
        status: 'active'

      - mistake: 'Leaving replication slot active when Electric is stopped'
        mechanism: 'Replication slot retains WAL indefinitely. Postgres disk fills up. Drop slot when stopping Electric for extended periods.'
        wrong_pattern: |
          docker stop electric
          # Replication slot still active, WAL grows unbounded
        correct_pattern: |
          docker stop electric
          psql -c "SELECT pg_drop_replication_slot('electric_slot_default');"
          # Or set: ALTER SYSTEM SET max_slot_wal_keep_size = '10GB';
        source: 'website/docs/guides/troubleshooting.md:203-316'
        priority: 'HIGH'
        status: 'active'

  - name: 'Deployment'
    slug: 'deployment'
    domain: 'running-in-production'
    description: 'Deploy Electric via Docker or Electric Cloud, configure Postgres for logical replication'
    type: 'lifecycle'
    covers:
      - 'Docker and docker-compose setup'
      - 'Electric Cloud deployment'
      - 'DATABASE_URL configuration'
      - 'ELECTRIC_SECRET and ELECTRIC_INSECURE'
      - 'Postgres wal_level, max_replication_slots'
      - 'Storage directory and persistence'
      - 'ELECTRIC_POOLED_DATABASE_URL for pooled connections'
      - 'IPv6 configuration'
      - 'Kubernetes readiness vs liveness probes'
    tasks:
      - 'Deploy Electric with Docker Compose'
      - 'Deploy to Electric Cloud'
      - 'Configure Postgres for logical replication'
      - 'Set up persistent storage for Electric'
      - 'Configure Kubernetes health checks'
    failure_modes:
      - mistake: 'Not setting wal_level to logical'
        mechanism: 'Electric requires logical replication. Default wal_level is "replica" which does not support it.'
        wrong_pattern: |
          # postgresql.conf (default)
          # wal_level = replica
        correct_pattern: |
          # postgresql.conf
          wal_level = logical
          max_replication_slots = 10
        source: 'packages/sync-service/dev/postgres.conf'
        priority: 'CRITICAL'
        status: 'active'

      - mistake: 'Running without ELECTRIC_SECRET in production'
        mechanism: 'Since v1.x, ELECTRIC_SECRET is required. ELECTRIC_INSECURE=true is for dev only.'
        wrong_pattern: |
          docker run electricsql/electric \
            -e DATABASE_URL=postgres://...
            # No ELECTRIC_SECRET — fails to start
        correct_pattern: |
          docker run electricsql/electric \
            -e DATABASE_URL=postgres://... \
            -e ELECTRIC_SECRET=my-secret-key
        source: 'packages/sync-service/CHANGELOG.md:832-834'
        priority: 'CRITICAL'
        status: 'active'

      - mistake: 'Using ephemeral storage for ELECTRIC_STORAGE_DIR'
        mechanism: 'Electric caches shape logs on disk. Ephemeral storage causes full re-sync on every restart.'
        source: 'website/docs/guides/deployment.md:133-157'
        priority: 'MEDIUM'
        status: 'active'

      - mistake: 'Using deprecated ELECTRIC_QUERY_DATABASE_URL'
        mechanism: 'Renamed to ELECTRIC_POOLED_DATABASE_URL. Old name may stop working.'
        wrong_pattern: |
          ELECTRIC_QUERY_DATABASE_URL=postgres://pooler:6432/mydb
        correct_pattern: |
          ELECTRIC_POOLED_DATABASE_URL=postgres://pooler:6432/mydb
        source: 'packages/sync-service/CHANGELOG.md:415'
        priority: 'MEDIUM'
        status: 'active'
        version_context: 'Renamed in v1.3.x'

  - name: 'Yjs Collaboration'
    slug: 'yjs-collaboration'
    domain: 'integrating-with-frameworks'
    description: 'Set up ElectricProvider for real-time collaborative editing with Yjs, including document sync, awareness, and resume state'
    type: 'composition'
    covers:
      - 'ElectricProvider'
      - 'LocalStorageResumeStateProvider'
      - 'Document updates shape and table schema'
      - 'Awareness shape and table schema'
      - 'parseToDecoder for BYTEA columns'
      - 'Resume state persistence'
      - 'Debouncing writes'
      - 'sendErrorRetryHandler'
    tasks:
      - 'Set up ElectricProvider for collaborative document editing'
      - 'Create the Postgres schema for Yjs document and awareness tables'
      - 'Implement resume state for efficient reconnection'
      - 'Configure awareness for presence/cursor sync'
      - 'Set up the server endpoint for receiving Yjs updates'
    failure_modes:
      - mistake: 'Not persisting resume state for reconnection'
        mechanism: 'Without ResumeState, the provider fetches the ENTIRE shape on reconnect. With stableStateVector, only a diff is sent.'
        wrong_pattern: |
          new ElectricProvider({
            doc: ydoc,
            documentUpdates: { shape: shapeOpts, sendUrl: '/api/yjs/update' },
            // No resumeState — full re-sync every reconnect
          })
        correct_pattern: |
          const resumeProvider = new LocalStorageResumeStateProvider('my-doc')
          new ElectricProvider({
            doc: ydoc,
            documentUpdates: { shape: shapeOpts, sendUrl: '/api/yjs/update' },
            resumeState: resumeProvider.load(),
          })
        source: 'packages/y-electric/src/types.ts:102-112'
        priority: 'HIGH'
        status: 'active'

      - mistake: 'Missing BYTEA parser for shape streams'
        mechanism: 'Yjs updates are stored as BYTEA. Must use parseToDecoder.bytea to convert hex to lib0 Decoder.'
        wrong_pattern: |
          documentUpdates: {
            shape: { url: '/api/yjs/updates', params: { table: 'ydoc_update' } },
            // No parser — raw hex strings instead of decoders
          }
        correct_pattern: |
          import { parseToDecoder } from '@electric-sql/y-electric'
          documentUpdates: {
            shape: {
              url: '/api/yjs/updates',
              params: { table: 'ydoc_update' },
              parser: parseToDecoder,
            },
            getUpdateFromRow: (row) => row.update,
          }
        source: 'packages/y-electric/src/utils.ts'
        priority: 'HIGH'
        status: 'active'

      - mistake: 'Not setting debounceMs for collaborative editing'
        mechanism: 'Default debounceMs is 0, sending a PUT for every keystroke. Set to 100+ to batch rapid edits.'
        source: 'packages/y-electric/src/y-electric.ts'
        priority: 'MEDIUM'
        status: 'active'

  - name: 'New Feature End-to-End'
    slug: 'new-feature-e2e'
    domain: 'building-features'
    description: 'End-to-end journey for adding a new synced feature: schema design, shape definition, proxy/auth setup, and frontend components'
    type: 'lifecycle'
    covers:
      - 'Schema design for shapes'
      - 'Shape configuration'
      - 'Proxy route creation'
      - 'TanStack DB collection setup'
      - 'Optimistic mutations with txid handshake'
      - 'Live query implementation'
    tasks:
      - 'Add a new synced table/feature from scratch'
      - 'Design schema, shapes, proxy, and UI together'
      - 'Implement optimistic writes with txid reconciliation'
    failure_modes:
      - mistake: 'Using old electrify() bidirectional sync API'
        mechanism: 'Old ElectricSQL had bidirectional SQLite sync. New Electric is read-only. Writes go through your API.'
        wrong_pattern: |
          const { db } = await electrify(conn, schema)
          await db.todos.create({ text: 'New todo' })
        correct_pattern: |
          // Read: Electric shape → TanStack DB collection
          // Write: collection.insert() → onInsert → API → Postgres → txid → awaitTxId
          todoCollection.insert({ id: crypto.randomUUID(), text: 'New todo' })
        source: 'AGENTS.md:386-392'
        priority: 'CRITICAL'
        status: 'active'
        version_context: 'Old ElectricSQL v0.x pattern. Agents trained on older docs still generate this.'
        skills: ['new-feature-e2e', 'shape-streaming']

      - mistake: 'Using path-based table URL pattern'
        mechanism: 'Old API used /v1/shape/{table}. Current API uses /v1/shape?table={table} as query param.'
        wrong_pattern: |
          url: 'http://localhost:3000/v1/shape/todos?offset=-1'
        correct_pattern: |
          url: 'http://localhost:3000/v1/shape?table=todos&offset=-1'
        source: 'packages/sync-service/CHANGELOG.md:1124'
        priority: 'HIGH'
        status: 'active'
        version_context: 'Changed in v0.8.0. Agents trained on older code still generate the path-based pattern.'
        skills: ['new-feature-e2e', 'shape-streaming']

      - mistake: 'Using shape_id instead of handle'
        mechanism: 'Renamed from shape_id to handle in v0.8.0.'
        wrong_pattern: |
          params: { shape_id: '12345' }
        correct_pattern: |
          handle: '12345'
        source: 'packages/sync-service/CHANGELOG.md:1123'
        priority: 'MEDIUM'
        status: 'active'
        version_context: 'Changed in v0.8.0'

  - name: 'ORM Integration'
    slug: 'orm-integration'
    domain: 'integrating-with-frameworks'
    description: 'Use Electric with Drizzle or Prisma for the write path, schema management, and migrations'
    type: 'composition'
    covers:
      - 'Drizzle ORM for write-path queries'
      - 'Prisma for write-path queries'
      - 'Schema migrations that work with Electric'
      - 'Getting txid from ORM queries'
    tasks:
      - 'Set up Drizzle/Prisma alongside Electric for writes'
      - 'Get Postgres txid from ORM write operations'
      - 'Run migrations that maintain Electric compatibility'
    compositions:
      - library: 'Drizzle ORM'
        skill: 'orm-integration'
      - library: 'Prisma'
        skill: 'orm-integration'
    failure_modes:
      - mistake: 'Not returning txid from ORM write operations'
        mechanism: 'ORMs typically do not return pg_current_xact_id(). Must add raw SQL query for txid in the same transaction.'
        wrong_pattern: |
          // Drizzle
          const todo = await db.insert(todos).values({ text: 'New' }).returning()
          return { id: todo.id } // no txid!
        correct_pattern: |
          const todo = await db.transaction(async (tx) => {
            const [row] = await tx.insert(todos).values({ text: 'New' }).returning()
            const [{ txid }] = await tx.execute(sql`SELECT pg_current_xact_id()::xid::text as txid`)
            return { id: row.id, txid: parseInt(txid) }
          })
        source: 'AGENTS.md:116-119'
        priority: 'HIGH'
        status: 'active'

      - mistake: 'Running migrations that drop replica identity'
        mechanism: 'Some migration tools reset table properties. Must ensure REPLICA IDENTITY FULL is preserved after migrations.'
        source: 'website/docs/guides/troubleshooting.md:373'
        priority: 'MEDIUM'
        status: 'active'

tensions:
  - name: 'Security vs. getting-started simplicity'
    skills: ['proxy-and-auth', 'deployment']
    description: 'Production requires a server proxy, ELECTRIC_SECRET, and careful param forwarding. Getting started examples use ELECTRIC_INSECURE=true and direct client access.'
    implication: 'Agents optimize for simplicity and generate code that calls Electric directly from the browser with ELECTRIC_INSECURE=true, skipping the proxy. This works in dev but is a security hole in production.'

  - name: 'Shape immutability vs. dynamic filtering'
    skills: ['shape-streaming', 'schema-and-shapes']
    description: 'Shapes are immutable once subscribed. Dynamic filters (search, pagination) require creating new shape instances, not mutating existing ones.'
    implication: 'Agents treat shape params like React Query keys — expecting to update them dynamically. They mutate options on running streams instead of creating new ShapeStream instances.'

  - name: 'Read-only sync vs. full-stack data flow'
    skills: ['new-feature-e2e', 'orm-integration']
    description: 'Electric only syncs reads. Writes require a separate API endpoint, txid handshake, and optimistic state management via TanStack DB.'
    implication: 'Agents trained on old ElectricSQL or similar sync libraries generate bidirectional sync code. They skip the write-path API and txid reconciliation, causing data loss or UI flicker.'

