name: Build and publish Electric image

# Reusable workflow that builds a multi-arch Docker image and publishes it to Docker Hub.
# Called by the release and custom-build workflows.
on:
  workflow_call:
    inputs:
      git_ref:
        description: 'Git ref to check out (branch, tag, or commit SHA)'
        required: true
        type: string
      electric_version:
        description: 'Version string baked into the binary via ELECTRIC_VERSION build arg'
        required: true
        type: string
      electric_tags:
        description: 'Docker tags for electricsql/electric (e.g. -t electricsql/electric:latest)'
        required: true
        type: string
      canary_tags:
        description: 'Docker tags for electricsql/electric-canary (empty to skip)'
        required: false
        default: ''
        type: string

env:
  DOCKERHUB_REPO: electricsql/electric
  DOCKERHUB_CANARY_REPO: electricsql/electric-canary

jobs:
  build_and_push_image:
    strategy:
      matrix:
        include:
          - platform: linux/amd64
            platform_id: amd64
            runner: blacksmith-4vcpu-ubuntu-2404
          - platform: linux/arm64/v8
            platform_id: arm64
            runner: blacksmith-4vcpu-ubuntu-2404-arm
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.git_ref }}

      - uses: useblacksmith/setup-docker-builder@v1

      - uses: docker/login-action@v3
        with:
          registry: docker.io
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push by digest
        id: build
        uses: useblacksmith/build-push-action@v2
        with:
          context: packages/sync-service
          build-contexts: |
            electric-telemetry=packages/electric-telemetry
          build-args: |
            ELECTRIC_VERSION=${{ inputs.electric_version }}
          platforms: ${{ matrix.platform }}
          push: true
          # push an untagged image and export its digest
          # the subsequent merge job will assemble the manifest list and apply tags
          outputs: type=image,push-by-digest=true,name-canonical=true,push=true
          tags: |
            ${{ env.DOCKERHUB_REPO }}
            ${{ env.DOCKERHUB_CANARY_REPO }}

      # Save the digest so the merge job can find both platform images
      - name: Export digest
        run: |
          mkdir -p /tmp/digests
          echo "${{ steps.build.outputs.digest }}" > "/tmp/digests/${{ matrix.platform_id }}.digest"

      - uses: actions/upload-artifact@v4
        with:
          name: digests-${{ matrix.platform_id }}
          path: /tmp/digests/*

  publish_tagged_image:
    needs: [build_and_push_image]
    runs-on: blacksmith-2vcpu-ubuntu-2404
    steps:
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - uses: useblacksmith/setup-docker-builder@v1

      - uses: actions/download-artifact@v4
        with:
          pattern: digests-*
          merge-multiple: true
          path: /tmp/digests

      - name: Create multi-arch manifest list
        run: |
          set -euo pipefail

          # Build a list of $DOCKERHUB_REPO@sha256:... source images
          ELECTRIC_IMAGES=$(
            for f in /tmp/digests/*.digest; do
              echo $DOCKERHUB_REPO@$(cat $f)
            done
          )

          # Create a manifest list for $DOCKERHUB_REPO that includes both platforms
          docker buildx imagetools create ${{ inputs.electric_tags }} $ELECTRIC_IMAGES

          if [ -n "${{ inputs.canary_tags }}" ]; then
            # Build a list of $DOCKERHUB_CANARY_REPO@sha256:... source images
            ELECTRIC_CANARY_IMAGES=$(
              for f in /tmp/digests/*.digest; do
                echo $DOCKERHUB_CANARY_REPO@$(cat $f)
              done
            )

            # Create a manifest list for $DOCKERHUB_CANARY_REPO that includes both platforms
            docker buildx imagetools create ${{ inputs.canary_tags }} $ELECTRIC_CANARY_IMAGES
          fi
