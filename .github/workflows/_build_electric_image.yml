name: Build Electric image

# Reusable workflow that builds multi-arch Docker images and exports their digests.
# Callers are responsible for creating manifest lists and applying tags.
on:
  workflow_call:
    inputs:
      git_ref:
        description: 'Git ref to check out (branch, tag, or commit SHA)'
        required: true
        type: string
      electric_version:
        description: 'Version string baked into the binary via ELECTRIC_VERSION build arg'
        required: true
        type: string

env:
  DOCKERHUB_REPO: electricsql/electric
  DOCKERHUB_CANARY_REPO: electricsql/electric-canary

jobs:
  build:
    strategy:
      matrix:
        include:
          - platform: linux/amd64
            platform_id: amd64
            runner: blacksmith-4vcpu-ubuntu-2404
          - platform: linux/arm64/v8
            platform_id: arm64
            runner: blacksmith-4vcpu-ubuntu-2404-arm
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.git_ref }}

      - uses: useblacksmith/setup-docker-builder@v1

      - uses: docker/login-action@v3
        with:
          registry: docker.io
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push by digest
        id: build
        uses: useblacksmith/build-push-action@v2
        with:
          context: packages/sync-service
          build-contexts: |
            electric-telemetry=packages/electric-telemetry
          build-args: |
            ELECTRIC_VERSION=${{ inputs.electric_version }}
          platforms: ${{ matrix.platform }}
          push: true
          # push an untagged image and export its digest
          # the caller will assemble the manifest list and apply tags
          outputs: type=image,push-by-digest=true,name-canonical=true,push=true
          tags: |
            ${{ env.DOCKERHUB_REPO }}
            ${{ env.DOCKERHUB_CANARY_REPO }}

      - name: Export digest
        run: |
          mkdir -p /tmp/digests
          echo "${{ steps.build.outputs.digest }}" > "/tmp/digests/${{ matrix.platform_id }}.digest"

      - uses: actions/upload-artifact@v4
        with:
          name: digests-${{ matrix.platform_id }}
          path: /tmp/digests/*
