name: Load test a PR

on:
  pull_request:
    types: [labeled]

env:
  PROJECT_ID: vaxine
  REGISTRY: europe-docker.pkg.dev/vaxine/electric

jobs:
  build:
    permissions:
      pull-requests: write
      contents: read
    name: Build image and run load test
    if: ${{ github.event.label.name == 'load-test' }}
    runs-on: ubuntu-latest
    steps:
      - uses: docker/setup-buildx-action@v3
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
      - uses: google-github-actions/auth@v1
        with:
          credentials_json: ${{ secrets.GCLOUD_REGISTRY_JSON_KEY }}
      - uses: google-github-actions/setup-gcloud@v1
      - name: Docker auth
        run: gcloud auth configure-docker europe-docker.pkg.dev --quiet
      - name: Set outputs
        run: echo "SHORT_SHA=$(git rev-parse --short=5 HEAD)" >> $GITHUB_ENV

      - name: Build builder image
        uses: docker/build-push-action@v6
        with:
          context: packages/sync-service
          target: builder
          push: true
          tags: |
            ${{ env.REGISTRY }}/electric:pr-${{ github.event.pull_request.number }}-builder
          cache-from: |
            type=registry,ref=${{ env.REGISTRY }}/electric:canary-builder
            type=registry,ref=${{ env.REGISTRY }}/electric:pr-${{ github.event.pull_request.number }}-builder
          cache-to: |
            type=inline
          build-contexts: |
            electric-telemetry=${{ github.workspace }}/packages/electric-telemetry

      - name: Build runner base image
        uses: docker/build-push-action@v6
        with:
          context: packages/sync-service
          target: runner_setup
          push: true
          tags: |
            ${{ env.REGISTRY }}/electric:pr-${{ github.event.pull_request.number }}-runner-base
          cache-from: |
            type=registry,ref=${{ env.REGISTRY }}/electric:canary-runner-base
            type=registry,ref=${{ env.REGISTRY }}/electric:pr-${{ github.event.pull_request.number }}-runner-base
          cache-to: |
            type=inline

      - name: Build final image
        uses: docker/build-push-action@v6
        with:
          context: packages/sync-service
          push: true
          tags: |
            ${{ env.REGISTRY }}/electric:pr-${{ github.event.pull_request.number }}-${{ env.SHORT_SHA }}
          cache-from: |
            type=registry,ref=${{ env.REGISTRY }}/electric:pr-${{ github.event.pull_request.number }}-builder
            type=registry,ref=${{ env.REGISTRY }}/electric:pr-${{ github.event.pull_request.number }}-runner-base
          cache-to: |
            type=inline
          build-contexts: |
            electric-telemetry=${{ github.workspace }}/packages/electric-telemetry

      - name: controlled_load_test benchmark
        run: |
          curl -X POST 'https://benchmarking.electric-sql.com/api/benchmarks/controlled_load_test/runs' \
            -u benchmarking:${{ secrets.BENCHMARKING_API_PASSWORD }} \
            -H 'Content-Type: application/json' \
            --fail-with-body \
            -d '{
              "benchmark_run": {
                "spec_values": {
                  "electric_image": ["${{ env.REGISTRY }}/electric:pr-${{ github.event.pull_request.number }}-${{ env.SHORT_SHA }}"],
                  "postgres_image": ["postgres:15-alpine"],
                  "num_readers": [1000],
                  "num_writers": [10],
                  "target_tps": [50],
                  "shapes_per_reader": [3],
                  "spawn_rate": [20],
                  "duration_minutes": [30],
                  "row_count": [50000]
                },
                "machine_request": {
                  "vcpu": 4,
                  "mem_gb": 8
                },
                "machine_overrides": {
                  "runner": {
                    "vcpu": 8,
                    "mem_gb": 32
                  }
                },
                "metadata": {
                  "pr": ${{ github.event.pull_request.number }},
                  "short_version": "pr-${{ github.event.pull_request.number }}-${{ env.SHORT_SHA }}",
                  "callback": {
                    "method": "POST",
                    "headers": [
                      ["Accept","application/vnd.github+json"],
                      ["Authorization","Bearer ${{ secrets.CROSSREPO_PAT }}"],
                      ["X-GitHub-Api-Version","2022-11-28"]
                    ],
                    "url":"https://api.github.com/repos/electric-sql/electric/actions/workflows/leave_benchmark_comment.yml/dispatches",
                    "body": "{\"ref\":\"main\",\"inputs\":{\"pr\":\"${{ github.event.pull_request.number }}\",\"benchmark_info\":#{benchmark_info},\"original_commit\":\"${{ env.SHORT_SHA }}\"}}"
                  }
                }
              }
            }'

      - name: controlled_load_test_subqueries benchmark
        run: |
          curl -X POST 'https://benchmarking.electric-sql.com/api/benchmarks/controlled_load_test_subqueries/runs' \
            -u benchmarking:${{ secrets.BENCHMARKING_API_PASSWORD }} \
            -H 'Content-Type: application/json' \
            --fail-with-body \
            -d '{
              "benchmark_run": {
                "spec_values": {
                  "electric_image": ["${{ env.REGISTRY }}/electric:pr-${{ github.event.pull_request.number }}-${{ env.SHORT_SHA }}"],
                  "postgres_image": ["postgres:15-alpine"],
                  "num_readers": [1000],
                  "num_writers": [10],
                  "target_tps": [50],
                  "shapes_per_reader": [3],
                  "spawn_rate": [20],
                  "duration_minutes": [30],
                  "row_count": [50000]
                },
                "machine_request": {
                  "vcpu": 4,
                  "mem_gb": 8
                },
                "machine_overrides": {
                  "runner": {
                    "vcpu": 8,
                    "mem_gb": 32
                  }
                },
                "metadata": {
                  "pr": ${{ github.event.pull_request.number }},
                  "short_version": "pr-${{ github.event.pull_request.number }}-${{ env.SHORT_SHA }}"
                }
              }
            }'

      - name: Add reaction to label event
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              body: `🏋️ Load test triggered for ${context.payload.pull_request.head.sha.substring(0, 7)}. Results will be posted here when complete.`
            })
