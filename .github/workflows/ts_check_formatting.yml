name: TS formatting

on:
  pull_request:
    paths-ignore:
      - '**/README.md'
      - 'integration-tests/**'

permissions:
  contents: read
  pull-requests: read

jobs:
  check_ts_changes:
    name: Check for TS-related changes
    runs-on: blacksmith-2vcpu-ubuntu-2404
    outputs:
      should_run: ${{ steps.check.outputs.should_run }}
    steps:
      - id: check
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Always run for the changesets release branch
          if [[ "${{ github.head_ref }}" == "changeset-release/main" ]]; then
            echo "should_run=true" >> $GITHUB_OUTPUT
            exit 0
          fi

          # Check if any TS-related files changed in the PR
          CHANGED=$(gh api "repos/${{ github.repository }}/pulls/${{ github.event.pull_request.number }}/files" --paginate --jq '.[].filename')

          if echo "$CHANGED" | grep -qE '^(packages/(typescript-client|react-hooks|y-electric|experimental|start)/|examples/|website/|pnpm-lock\.yaml$|package\.json$|pnpm-workspace\.yaml$|\.tool-versions$|\.github/workflows/(ts_|ensure_sync_service|pr\.)|\.github/actions/)'; then
            echo "should_run=true" >> $GITHUB_OUTPUT
          else
            echo "should_run=false" >> $GITHUB_OUTPUT
          fi

  ts_check_formatting:
    name: Check formatting of TS packages, examples and website
    needs: [check_ts_changes]
    if: needs.check_ts_changes.outputs.should_run == 'true'
    runs-on: blacksmith-2vcpu-ubuntu-2404
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.tool-versions'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check Prettier formatting
        run: pnpm run format:check

      - name: Check ESLint (all packages)
        run: pnpm run stylecheck-all
