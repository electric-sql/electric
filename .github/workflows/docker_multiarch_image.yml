name: Build and publish multi-arch image

on:
  workflow_call:
    inputs:
      git_ref:
        description: 'Git ref to build from (branch name, tag, or commit SHA)'
        required: true
        type: string
      image_repo:
        description: 'Canonical image repository used for push-by-digest, e.g. electricax/agents-server'
        required: true
        type: string
      context:
        description: 'Docker build context'
        required: true
        type: string
      file:
        description: 'Dockerfile path'
        required: true
        type: string
      tags:
        description: 'Newline-delimited fully-qualified image refs to publish, e.g. repo:latest'
        required: true
        type: string
      registry:
        description: 'Container registry hostname'
        required: false
        default: 'docker.io'
        type: string
      build_contexts:
        description: 'Optional build contexts, passed through to build-push-action'
        required: false
        default: ''
        type: string
      build_args:
        description: 'Optional build args, passed through to build-push-action'
        required: false
        default: ''
        type: string
      platform_matrix:
        description: 'JSON matrix with include entries containing platform, platform_id, and runner'
        required: false
        default: '{"include":[{"platform":"linux/amd64","platform_id":"amd64","runner":"blacksmith-4vcpu-ubuntu-2404"},{"platform":"linux/arm64/v8","platform_id":"arm64","runner":"blacksmith-4vcpu-ubuntu-2404-arm"}]}'
        type: string
      artifact_prefix:
        description: 'Prefix used to isolate digest artifacts when multiple image publish workflows run together'
        required: false
        default: 'image'
        type: string

jobs:
  build_and_push_image:
    strategy:
      matrix: ${{ fromJSON(inputs.platform_matrix) }}
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.git_ref }}

      - uses: useblacksmith/setup-docker-builder@v1

      - uses: docker/login-action@v3
        with:
          registry: ${{ inputs.registry }}
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Derive push-by-digest image repositories
        id: image_repos
        env:
          IMAGE_REPO: ${{ inputs.image_repo }}
          IMAGE_TAGS: ${{ inputs.tags }}
        run: |
          set -euo pipefail

          repos_file="$(mktemp)"
          printf '%s\n' "$IMAGE_REPO" >> "$repos_file"

          while IFS= read -r tag; do
            if [ -n "$tag" ]; then
              printf '%s\n' "${tag%:*}" >> "$repos_file"
            fi
          done <<< "$IMAGE_TAGS"

          {
            echo "repos<<EOF"
            sort -u "$repos_file"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Build and push by digest
        id: build
        uses: useblacksmith/build-push-action@v2
        with:
          context: ${{ inputs.context }}
          file: ${{ inputs.file }}
          build-contexts: ${{ inputs.build_contexts }}
          build-args: ${{ inputs.build_args }}
          platforms: ${{ matrix.platform }}
          push: true
          outputs: type=image,push-by-digest=true,name-canonical=true,push=true
          tags: ${{ steps.image_repos.outputs.repos }}

      - name: Export digest
        run: |
          mkdir -p /tmp/digests
          echo "${{ steps.build.outputs.digest }}" > "/tmp/digests/${{ matrix.platform_id }}.digest"

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.artifact_prefix }}-digests-${{ matrix.platform_id }}
          path: /tmp/digests/*

  publish_tagged_image:
    needs: [build_and_push_image]
    runs-on: blacksmith-2vcpu-ubuntu-2404
    steps:
      - uses: docker/login-action@v3
        with:
          registry: ${{ inputs.registry }}
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - uses: useblacksmith/setup-docker-builder@v1

      - uses: actions/download-artifact@v4
        with:
          pattern: ${{ inputs.artifact_prefix }}-digests-*
          merge-multiple: true
          path: /tmp/digests

      - name: Create multi-arch manifest list
        env:
          IMAGE_TAGS: ${{ inputs.tags }}
        run: |
          set -euo pipefail

          while IFS= read -r tag; do
            if [ -z "$tag" ]; then
              continue
            fi

            image_repo="${tag%:*}"
            image_sources=$(
              for f in /tmp/digests/*.digest; do
                echo "$image_repo@$(cat "$f")"
              done
            )

            docker buildx imagetools create -t "$tag" $image_sources
          done <<< "$IMAGE_TAGS"
