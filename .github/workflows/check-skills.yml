# check-skills.yml — Drop this into your library repo's .github/workflows/
#
# Validates intent skills on PRs. After a publish workflow call or manual run,
# opens or updates one review PR when published package skills need review.
#
# Triggers: pull requests touching skills/artifacts, workflow_call from the
# changesets publish workflow, or manual workflow_dispatch.
#
# intent-workflow-version: 3
#
# Intent skill packages are listed explicitly in the review job.

name: Check Skills

on:
  pull_request:
    paths:
      - 'skills/**'
      - '**/skills/**'
      - '_artifacts/**'
      - '**/_artifacts/**'
  workflow_dispatch:
    inputs:
      review-ref:
        description: Identifier to use in the review branch and PR title.
        required: false
        type: string
      published-packages:
        description: JSON array of published package objects from changesets.
        required: false
        type: string
  workflow_call:
    inputs:
      review-ref:
        description: Identifier to use in the review branch and PR title.
        required: false
        type: string
      published-packages:
        description: JSON array of published package objects from changesets.
        required: false
        type: string

permissions:
  contents: write
  pull-requests: write

jobs:
  validate:
    name: Validate intent skills
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: '.tool-versions'

      - name: Install intent
        run: npm install -g @tanstack/intent

      - name: Validate skills
        run: intent validate --github-summary
# There should be a `review` job here, but we're not wiring it up just yet.
