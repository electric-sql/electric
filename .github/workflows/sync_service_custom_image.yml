name: Publish custom Electric image to Docker Hub

# Build and publish a Docker image from any branch, tag, or commit SHA
# with a custom Docker Hub tag. Useful for testing pre-release builds.
on:
  workflow_dispatch:
    inputs:
      custom_ref:
        description: 'Git ref to build from (branch name, tag, or commit SHA)'
        required: true
        type: string
      custom_tag:
        description: 'Docker Hub tag to publish as (e.g. subqueries-alpha)'
        required: true
        type: string

env:
  DOCKERHUB_REPO: electricsql/electric

jobs:
  build:
    strategy:
      matrix:
        include:
          - platform: linux/amd64
            platform_id: amd64
            runner: blacksmith-4vcpu-ubuntu-2404
          - platform: linux/arm64/v8
            platform_id: arm64
            runner: blacksmith-4vcpu-ubuntu-2404-arm
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.custom_ref }}

      - uses: useblacksmith/setup-docker-builder@v1

      - uses: docker/login-action@v3
        with:
          registry: docker.io
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push by digest
        id: build
        uses: useblacksmith/build-push-action@v2
        with:
          context: packages/sync-service
          build-contexts: |
            electric-telemetry=packages/electric-telemetry
          build-args: |
            ELECTRIC_VERSION=${{ inputs.custom_tag }}
          platforms: ${{ matrix.platform }}
          push: true
          outputs: type=image,push-by-digest=true,name-canonical=true,push=true
          tags: |
            ${{ env.DOCKERHUB_REPO }}

      - name: Export digest
        run: |
          mkdir -p /tmp/digests
          echo "${{ steps.build.outputs.digest }}" > "/tmp/digests/${{ matrix.platform_id }}.digest"

      - uses: actions/upload-artifact@v4
        with:
          name: digests-${{ matrix.platform_id }}
          path: /tmp/digests/*

  publish:
    needs: [build]
    runs-on: blacksmith-2vcpu-ubuntu-2404
    steps:
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - uses: useblacksmith/setup-docker-builder@v1

      - uses: actions/download-artifact@v4
        with:
          pattern: digests-*
          merge-multiple: true
          path: /tmp/digests

      - name: Create multi-arch manifest list
        run: |
          set -euo pipefail

          ELECTRIC_IMAGES=$(
            for f in /tmp/digests/*.digest; do
              echo $DOCKERHUB_REPO@$(cat $f)
            done
          )

          docker buildx imagetools create \
            -t $DOCKERHUB_REPO:${{ inputs.custom_tag }} \
            $ELECTRIC_IMAGES
