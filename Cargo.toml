[package]
name = "durable-streams-server"
version = "0.1.0"
edition = "2021"
description = "High-performance Durable Streams server (Rust)"
license = "Apache-2.0"
# Conservative floor, comfortably above the dependency MSRVs (tokio/hyper/
# ed25519-dalek). CI builds on stable; this documents the supported minimum.
rust-version = "1.74"
repository = "https://github.com/durable-streams/durable-streams"
homepage = "https://electric-sql.com/primitives/durable-streams"
readme = "README.md"

[dependencies]
tokio = { version = "1", features = ["full"] }
hyper = { version = "1", features = ["http1", "server"] }
hyper-util = { version = "0.1", features = ["tokio", "server", "http1"] }
http-body-util = "0.1"
bytes = "1"
dashmap = "6"
serde = { version = "1", features = ["derive"] }
serde_json = { version = "1", features = ["raw_value"] }
httparse = "1"
libc = "0.2"
percent-encoding = "2"
ed25519-dalek = { version = "2", default-features = false, features = ["std", "fast"] }

[profile.release]
lto = true
codegen-units = 1
panic = "abort"
