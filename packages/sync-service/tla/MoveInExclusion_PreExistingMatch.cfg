\* Scenario 4: Row already matches via one dep, other dep also becomes active
\* t1: already in shape via sqX (x1 was in pre-txn X)
\* Now sqY adds y1 — t1 should NOT be delivered again (already in shape)

CONSTANTS
    Rows = {"t1", "t2"}
    Deps = {"X", "Y"}
    Values = {"x1", "x2", "y1", "y2"}
    RowValues = ("t1" :> ("X" :> "x1" @@ "Y" :> "y1") @@
                 "t2" :> ("X" :> "x2" @@ "Y" :> "y2"))
    MaterializerPre = ("X" :> {"x1"} @@ "Y" :> {})
    MaterializerPost = ("X" :> {"x1"} @@ "Y" :> {"y1"})

SPECIFICATION Spec

INVARIANTS
    SafetyInvariant

PROPERTIES
    LivenessProperty
