\* Scenario 2: Three subqueries all changing in same transaction
\* WHERE x IN (sqX) OR y IN (sqY) OR z IN (sqZ)
\* Transaction: all three subqueries add values matching row t1
\* t1 should be delivered exactly once regardless of processing order (3! = 6 orderings)

CONSTANTS
    Rows = {"t1"}
    Deps = {"X", "Y", "Z"}
    Values = {"x1", "y1", "z1"}
    RowValues = ("t1" :> ("X" :> "x1" @@ "Y" :> "y1" @@ "Z" :> "z1"))
    MaterializerPre = ("X" :> {} @@ "Y" :> {} @@ "Z" :> {})
    MaterializerPost = ("X" :> {"x1"} @@ "Y" :> {"y1"} @@ "Z" :> {"z1"})

SPECIFICATION Spec

INVARIANTS
    SafetyInvariant

PROPERTIES
    LivenessProperty
