\* Scenario 1: The exact bug scenario from PLAN_UPDATE.md
\* WHERE x IN (subqueryX) OR y IN (subqueryY)
\* Transaction: subqueryX adds x1, subqueryY adds y1
\* Row t1 has x=x1, y=y1 -> should move in via either subquery

CONSTANTS
    Rows = {"t1", "t2"}
    Deps = {"X", "Y"}
    Values = {"x1", "x2", "y1", "y2"}
    RowValues = ("t1" :> ("X" :> "x1" @@ "Y" :> "y1") @@
                 "t2" :> ("X" :> "x2" @@ "Y" :> "y2"))
    MaterializerPre = ("X" :> {} @@ "Y" :> {})
    MaterializerPost = ("X" :> {"x1"} @@ "Y" :> {"y1"})

SPECIFICATION Spec

INVARIANTS
    SafetyInvariant

PROPERTIES
    LivenessProperty
