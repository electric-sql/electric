\* Scenario 3: Partial overlap — some rows match one dep, some match both
\* t1: matches both X and Y (both newly added)
\* t2: matches only X (y2 not in sqY)
\* t3: matches only Y (x3 not in sqX)
\* All three should be delivered exactly once

CONSTANTS
    Rows = {"t1", "t2", "t3"}
    Deps = {"X", "Y"}
    Values = {"x1", "x2", "x3", "y1", "y2", "y3"}
    RowValues = ("t1" :> ("X" :> "x1" @@ "Y" :> "y1") @@
                 "t2" :> ("X" :> "x2" @@ "Y" :> "y2") @@
                 "t3" :> ("X" :> "x3" @@ "Y" :> "y3"))
    MaterializerPre = ("X" :> {} @@ "Y" :> {})
    MaterializerPost = ("X" :> {"x1", "x2"} @@ "Y" :> {"y1", "y3"})

SPECIFICATION Spec

INVARIANTS
    SafetyInvariant

PROPERTIES
    LivenessProperty
