\* Scenario 5: Only one dep changes — no exclusion issues possible
\* Baseline sanity check: sqX adds x1, sqY unchanged
\* t1 should move in, t2 should not

CONSTANTS
    Rows = {"t1", "t2"}
    Deps = {"X", "Y"}
    Values = {"x1", "x2", "y1", "y2"}
    RowValues = ("t1" :> ("X" :> "x1" @@ "Y" :> "y1") @@
                 "t2" :> ("X" :> "x2" @@ "Y" :> "y2"))
    MaterializerPre = ("X" :> {} @@ "Y" :> {})
    MaterializerPost = ("X" :> {"x1"} @@ "Y" :> {})

SPECIFICATION Spec

INVARIANTS
    SafetyInvariant

PROPERTIES
    LivenessProperty
