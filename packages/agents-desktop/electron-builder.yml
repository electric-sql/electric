appId: com.electric-sql.agents
productName: Electric Agents
artifactName: Electric-Agents-${os}-${arch}.${ext}

directories:
  buildResources: build
  output: release

files:
  - dist/**/*
  - assets/**/*
  - package.json
  - '!**/node_modules/@rollup/**'

extraResources:
  - from: ../agents-server-ui/dist-desktop
    to: renderer
    filter:
      - '**/*'
  - from: assets
    to: assets
    filter:
      - '**/*'
  - from: ../agents/skills
    to: agent-skills
    filter:
      - '**/*'
  - from: ../electric-ax/dist-desktop
    to: cli/electric-ax/dist
    filter:
      - '**/*'
  - from: ../electric-ax/docker-compose.full.yml
    to: cli/electric-ax/docker-compose.full.yml

asar: true
asarUnpack:
  - '**/*.node'
  - '**/node_modules/better-sqlite3/**/*'
  - '**/node_modules/sqlite-vec/**/*'

mac:
  category: public.app-category.developer-tools
  hardenedRuntime: true
  gatekeeperAssess: false
  icon: build/icons/mac/icon.icns
  target:
    - target: dmg
      arch:
        - x64
        - arm64
    - target: zip
      arch:
        - x64
        - arm64

win:
  icon: build/icons/win/icon.ico
  target:
    - target: nsis
      arch:
        - x64

linux:
  category: Development
  icon: build/icons/png
  maintainer: ElectricSQL <info@electric-sql.com>
  target:
    - target: AppImage
      arch:
        - x64
    - target: deb
      arch:
        - x64

publish:
  provider: github
  owner: electric-sql
  repo: electric
