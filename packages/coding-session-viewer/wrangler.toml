# Cloudflare deployment config for the coding-session viewer.
#
# Deploys the built SPA (`dist/`) as static assets — no Worker code
# needed, no KV, no backend. The viewer is a pure browser app that
# talks directly to whatever agents-server URL the user pastes in.
#
# Before deploying:
#   pnpm --filter @electric-ax/coding-session-viewer build
#
# Deploy:
#   pnpm --filter @electric-ax/coding-session-viewer deploy
# (or `pnpm deploy` inside this package's directory)
#
# Deploys to the default <name>.<your-subdomain>.workers.dev by default.
# Point a custom domain at it by uncommenting the [[routes]] block and
# setting CODING_SESSION_VIEWER_DOMAIN in your env (used by a future
# template-expand script if we want one — for now just edit in place).

name = "electric-agents-web-viewer"
compatibility_date = "2025-01-09"

[assets]
directory = "./dist"
# SPA mode: unknown paths fall back to index.html so the browser-side
# router (just the ?server=…&entity=… query handling in App.tsx) owns
# routing. The viewer has no server-side routes to reserve.
not_found_handling = "single-page-application"

[[routes]]
pattern = "agents.electric-sql.com"
custom_domain = true
